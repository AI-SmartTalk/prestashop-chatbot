# Docker Compose prod pour prestashop.demo.aismarttalk.tech
#
# Prérequis côté VPS (voir aist-scripts/demo-vps/README.md) :
#   - Réseau Docker externe "edge" créé (partagé avec Caddy)
#   - Fichier .env à côté de ce compose contenant notamment :
#       MYSQL_ROOT_PASSWORD=<openssl rand -base64 32>
#       MYSQL_DATABASE=prestashop
#       MYSQL_USER=prestashop
#       MYSQL_PASSWORD=<openssl rand -base64 32>
#       DB_USER=prestashop
#       DB_PASSWD=<même valeur que MYSQL_PASSWORD>
#       DB_NAME=prestashop
#       PS_DOMAIN=prestashop.demo.aismarttalk.tech
#
# Aucun port n'est publié : Caddy route via le réseau "edge" (alias "ps-demo").

services:
  prestashop:
    build:
      context: .
      dockerfile: Dockerfile.prod
    platform: linux/amd64
    env_file: .env
    environment:
      - DB_SERVER=prestashop_db
    # Pas de read_only ici : l'image prestashop écrit à plusieurs endroits au
    # runtime (init scripts, config Apache dynamique, installation PS) et
    # restart-loop en exit 127 si on la bride. Le durcissement repose sur :
    #   - module custom bind-monté en :ro (vecteur webshell bloqué)
    #   - mots de passe DB forts (.env)
    #   - iptables DOCKER-USER bloque l'UDP sortant
    #   - pas de phpMyAdmin exposé
    volumes:
      - ./modules/aismarttalk:/var/www/html/modules/aismarttalk:ro
      - ./config/docker:/tmp/docker-config:ro
      - ./data/prestashop:/var/www/html
    restart: always
    networks:
      internal: {}
      edge:
        aliases: [ps-demo]
    depends_on:
      prestashop_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE, DAC_OVERRIDE]
    pids_limit: 300
    mem_limit: 768m

  prestashop_db:
    image: mysql:5.7
    platform: linux/amd64
    env_file: .env
    restart: always
    networks: [internal]
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]

networks:
  internal:
    driver: bridge
    internal: true
  edge:
    external: true
    name: edge
